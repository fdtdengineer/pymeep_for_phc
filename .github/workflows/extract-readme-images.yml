name: Extract README notebook images

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/extract-readme-images.yml

permissions:
  contents: write

jobs:
  extract-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract embedded notebook images
        run: python tools/extract_readme_images.py

      - name: Commit README images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/images/*.png
          if git diff --cached --quiet; then
            echo "README images are already up to date."
            exit 0
          fi
          git commit -m "Add README notebook figures"
          git push
